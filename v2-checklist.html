<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>學分 · 清單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEFF3; --card:#FFFFFF; --ink:#16181D; --ink2:#8A8E98; --ink3:#B7BBC4;
  --green:#1FA463; --green-d:#188a52; --sep:#ECEDF1; --blue:#2F6BE6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:"Hanken Grotesk","Noto Sans TC",system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100dvh;line-height:1.45;padding-bottom:calc(86px + env(safe-area-inset-bottom))}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:560px;margin:0 auto;padding:0 14px}

/* sticky header */
.top{position:sticky;top:0;z-index:30;background:rgba(239,239,243,.82);backdrop-filter:saturate(180%) blur(14px);
  padding:calc(10px + env(safe-area-inset-top)) 0 12px;border-bottom:1px solid rgba(0,0,0,.05)}
.top .wrap{padding-top:4px}
.tline{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.ttl{font-size:13px;font-weight:700;color:var(--ink2);letter-spacing:.02em}
.ttl b{display:block;color:var(--ink);font-size:26px;font-weight:800;letter-spacing:-.01em;margin-top:1px}
.ttl b .g{color:var(--green)}
.frac{text-align:right;font-size:12px;color:var(--ink2)}
.frac b{font-size:22px;font-weight:800;color:var(--ink)}
.pbar{height:6px;border-radius:99px;background:#dfe0e6;margin-top:11px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#46c483);transition:width .5s cubic-bezier(.2,.8,.2,1)}
.mini{display:flex;gap:7px;margin-top:11px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.mini::-webkit-scrollbar{display:none}
.mpill{flex:0 0 auto;font-size:11.5px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid var(--sep);
  padding:5px 11px;border-radius:99px;display:flex;align-items:center;gap:5px;cursor:pointer}
.mpill.ok{color:var(--green);border-color:#cdebda;background:#f1faf4}
.mpill .d{width:6px;height:6px;border-radius:99px;background:var(--ink3)}
.mpill.ok .d{background:var(--green)}

/* grouped list */
.grp{margin-top:22px}
.ghead{display:flex;align-items:center;justify-content:space-between;padding:0 6px 8px}
.ghead .gn{font-size:13px;font-weight:700;color:var(--ink2);letter-spacing:.04em}
.ghead .gp{font-size:12px;font-weight:700;color:var(--ink3)}
.ghead .gp.ok{color:var(--green)}
.list{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(20,24,40,.04),0 10px 30px -22px rgba(20,24,40,.4)}
.item{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;position:relative}
.item+.item::before{content:"";position:absolute;left:51px;right:0;top:0;height:1px;background:var(--sep)}
.item:active{background:#f7f8fa}
.tick{flex:0 0 26px;width:26px;height:26px;border-radius:50%;border:2px solid #d4d7de;display:grid;place-items:center;transition:.18s;background:#fff}
.item.done .tick{background:var(--green);border-color:var(--green)}
.tick svg{opacity:0;transform:scale(.4);transition:.18s}
.item.done .tick svg{opacity:1;transform:scale(1)}
.iname{flex:1;font-size:15px;font-weight:500;letter-spacing:.01em}
.item.done .iname{color:var(--ink3);text-decoration:line-through;text-decoration-color:#d4d7de}
.icr{font-size:13px;font-weight:700;color:var(--ink3);font-variant-numeric:tabular-nums}
.item.done .icr{color:var(--green)}
.add{display:flex;align-items:center;gap:10px;padding:13px 16px;color:var(--blue);font-weight:600;font-size:14px;cursor:pointer}
.add .pl{width:26px;text-align:center;font-size:20px;font-weight:400}
.del{font-size:12px;color:#e0594e;margin-left:8px;font-weight:600}

.footnote{font-size:12px;color:var(--ink3);text-align:center;line-height:1.7;margin:26px 0 6px}

/* bottom bar */
.tab{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(16px);
  border-top:1px solid var(--sep);padding:8px 14px calc(8px + env(safe-area-inset-bottom))}
.tab .inner{max-width:560px;margin:0 auto;display:flex;gap:8px}
.tb{flex:1;border:none;background:#f2f3f6;color:var(--ink);border-radius:13px;padding:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.tb.main{background:var(--green);color:#fff}
.tb:active{transform:translateY(1px)}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(10,14,20,.4);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:60}
.scrim.on{display:flex}
.sheet{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:8px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.2);animation:up .3s cubic-bezier(.2,.8,.2,1)}
.grab{width:38px;height:5px;border-radius:99px;background:#dadce2;margin:6px auto 14px}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:18px;font-weight:800;margin-bottom:5px}
.sheet p{font-size:13px;color:var(--ink2);margin-bottom:14px}
.field{width:100%;border:1px solid var(--sep);background:#f7f8fa;border-radius:12px;padding:12px;font-family:inherit;font-size:14px;color:var(--ink);resize:none}
.linkbox{display:flex;gap:8px;margin:9px 0}
.linkbox input{flex:1;border:1px solid var(--sep);background:#f7f8fa;border-radius:11px;padding:11px;font-size:12px;color:var(--ink2);font-family:ui-monospace,monospace}
.cpy{border:none;background:var(--green);color:#fff;border-radius:11px;padding:0 16px;font-weight:700;font-size:13px;cursor:pointer}
.row2{display:flex;gap:10px;margin-top:14px}
.row2 .tb{padding:13px}
.selwrap{display:flex;gap:8px;margin-top:10px}
.selwrap select{border:1px solid var(--sep);background:#f7f8fa;border-radius:11px;padding:12px;font-family:inherit;font-size:14px}
.selwrap input{width:84px;border:1px solid var(--sep);background:#f7f8fa;border-radius:11px;padding:12px;font-family:inherit;font-size:14px}
.hint{font-size:12px;color:var(--blue);background:#eef4ff;border-radius:11px;padding:11px;margin-top:12px;line-height:1.6}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);background:#16181D;color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:.28s;z-index:70;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <div class="tline">
    <div class="ttl" id="ttl">距離畢業<b>還差 <span class="g num" id="rem">45</span> 學分</b></div>
    <div class="frac"><b class="num" id="done">0</b> / 45<br><span style="font-size:11px">已修學分</span></div>
  </div>
  <div class="pbar"><i id="pbar" style="width:0%"></i></div>
  <div class="mini" id="mini"></div>
</div></div>

<div class="wrap" id="groups"></div>
<div class="wrap"><p class="footnote">此表僅供個人自我追蹤，畢業資格以系辦審核為準。<br>所有紀錄只存在這支手機，不會上傳。</p></div>

<div class="tab"><div class="inner">
  <button class="tb main" onclick="openBackup()">📲 備份／換手機</button>
  <button class="tb" onclick="openRestore()">↺ 還原</button>
</div></div>

<div class="scrim" id="scrimB"><div class="sheet"><div class="grab"></div>
  <h3>備份 · 換手機</h3>
  <p>紀錄只存在這支手機。把這條「專屬連結」用 LINE 傳給自己，<b>新手機點開就自動還原</b>。</p>
  <div class="linkbox"><input id="bLink" readonly><button class="cpy" onclick="copy('bLink','已複製連結')">複製</button></div>
  <p style="margin:12px 0 4px">或複製短代碼，到新手機按「還原」貼上：</p>
  <div class="linkbox"><input id="bCode" readonly><button class="cpy" onclick="copy('bCode','已複製代碼')">複製</button></div>
  <div class="hint">💡 傳到自己 LINE 的「Keep 記事」最保險，永遠找得到。</div>
  <div class="row2"><button class="tb" onclick="closeAll()">關閉</button></div>
</div></div>

<div class="scrim" id="scrimR"><div class="sheet"><div class="grab"></div>
  <h3>還原紀錄</h3><p>貼上之前備份的連結或短代碼。</p>
  <textarea class="field" id="rIn" rows="3" placeholder="貼上連結或代碼…"></textarea>
  <div class="row2"><button class="tb" onclick="closeAll()">取消</button><button class="tb main" onclick="doRestore()">還原</button></div>
</div></div>

<div class="scrim" id="scrimA"><div class="sheet"><div class="grab"></div>
  <h3>新增課程</h3><p>母清單沒有的課，自己加進來。</p>
  <input class="field" id="aName" placeholder="課程名稱">
  <div class="selwrap"><select id="aCat"></select><input id="aCr" type="number" inputmode="numeric" value="3" placeholder="學分"></div>
  <div class="row2"><button class="tb" onclick="closeAll()">取消</button><button class="tb main" onclick="doAdd()">新增並打勾</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="core.js"></script>
<script>
const $=s=>document.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(t._);t._=setTimeout(()=>t.classList.remove('on'),1600)}
function copy(id,m){const el=document.getElementById(id);el.select();navigator.clipboard?.writeText(el.value).then(()=>toast(m)).catch(()=>{document.execCommand('copy');toast(m)})}
const tick='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6"/></svg>';

function render(){
  const r=Tracker.compute();
  $('#rem').textContent=r.remaining; $('#done').textContent=r.totalDone;
  $('#pbar').style.width=r.percent+'%';
  if(r.graduated){ $('#ttl').innerHTML='<b>🎓 學分已修滿！</b>'; }
  else{ $('#ttl').innerHTML='距離畢業<b>還差 <span class="g num">'+r.remaining+'</span> 學分</b>'; }
  $('#mini').innerHTML=CATEGORIES.map(c=>{const b=r.byCat[c.key],ok=b.done>=c.req;
    return `<button class="mpill ${ok?'ok':''}" onclick="jump('${c.key}')"><span class="d"></span>${c.key} ${b.done}/${c.req}</button>`}).join('');
  $('#groups').innerHTML=CATEGORIES.map(cat=>{
    const b=r.byCat[cat.key],ok=b.done>=cat.req;
    const items=b.courses.map(c=>{const done=Tracker.isDone(c.id),cust=String(c.id).startsWith('x');
      return `<div class="item ${done?'done':''}" onclick="tog('${c.id}')">
        <div class="tick">${tick}</div>
        <div class="iname">${c.n}${cust?'<span class="del" onclick="event.stopPropagation();delC(\''+c.id+'\')">刪</span>':''}</div>
        <div class="icr">${c.k}</div></div>`}).join('');
    return `<section class="grp" id="g-${cat.key}">
      <div class="ghead"><div class="gn">${cat.key}　·　需 ${cat.req} 學分</div><div class="gp ${ok?'ok':''}">${b.done} / ${cat.req}${ok?' ✓':''}</div></div>
      <div class="list">${items}<div class="add" onclick="openAdd('${cat.key}')"><span class="pl">＋</span>新增課程</div></div>
    </section>`}).join('');
}
function tog(id){Tracker.toggle(id)}
function delC(id){Tracker.removeCustom(id)}
function jump(k){document.getElementById('g-'+k).scrollIntoView({behavior:'smooth',block:'start'})}
function openBackup(){$('#bLink').value=Tracker.backupLink();$('#bCode').value=Tracker.code();$('#scrimB').classList.add('on')}
function openRestore(){$('#rIn').value='';$('#scrimR').classList.add('on')}
function openAdd(cat){$('#aName').value='';$('#aCr').value=3;$('#aCat').innerHTML=CATEGORIES.map(c=>`<option ${c.key===cat?'selected':''}>${c.key}</option>`).join('');$('#scrimA').classList.add('on')}
function closeAll(){document.querySelectorAll('.scrim').forEach(s=>s.classList.remove('on'))}
function doRestore(){try{Tracker.importCode($('#rIn').value);closeAll();toast('已還原 ✓')}catch(e){toast('代碼無法辨識')}}
function doAdd(){const n=$('#aName').value.trim();if(!n)return toast('請輸入課名');Tracker.addCustom(n,$('#aCat').value,$('#aCr').value);closeAll();toast('已新增 ✓')}
document.querySelectorAll('.scrim').forEach(s=>s.addEventListener('click',e=>{if(e.target===s)closeAll()}));
window.addEventListener('tracker:change',render);

const fromUrl=Tracker.load();
if(fromUrl&&(fromUrl.d?.length||fromUrl.x?.length)){setTimeout(()=>{if(confirm('偵測到備份連結，要用它還原嗎？')){Tracker._apply(fromUrl);Tracker.save();}render();history.replaceState(null,'',location.pathname)},300)}
render();
</script>
</body>
</html>
